project:
  type: book
  output-dir: _book

book:
  title: "Learning from Data"
  subtitle: "ENM 3800 — Course Notebooks"
  author: "Eva Dyer"
  search: true
  sidebar:
    style: docked
    collapse-level: 1
  chapters:
    - index.qmd
    - part: "Module 1: Learning from Data"
      chapters:
        - notebooks/Notebook_1/Notebook_1_Learning_from_Data.ipynb
    - part: "Module 2: Building & Selecting Models"
      chapters:
        - notebooks/Notebook_2/Notebook_2a_Building_a_Model.ipynb
        - notebooks/Notebook_2/Notebook_2b_Model_Selection.ipynb
    - part: "Module 3: Probability & Inference"
      chapters:
        - notebooks/Notebook_3/Notebook_3a_Probability_and_Covariance.ipynb
        - notebooks/Notebook_3/Notebook_3b_Hypothesis_Testing.ipynb
        - notebooks/Notebook_3/Notebook_3c_Bootstrapping_and_Permutation_Tests.ipynb
    - part: "Module 4: Supervised Learning"
      chapters:
        - notebooks/Notebook_4/Notebook_4a_Regression.ipynb
        - notebooks/Notebook_4/Notebook_4b_Classification.ipynb
        - notebooks/Notebook_4/Notebook_4c_PyTorch_Model.ipynb
    - part: "Module 5: Unsupervised Learning"
      chapters:
        - notebooks/Notebook_5/Notebook_5a_DimReduction.ipynb
        - notebooks/Notebook_5/Notebook_5b_Clustering.ipynb

format:
  html:
    theme: cosmo          # clean, readable textbook theme
    css: book.css         # hide redundant chapter-number prefix (see file)
    toc: true             # per-page table of contents
    toc-depth: 3
    code-fold: false      # show code by default
    code-tools: true      # toggle to hide/show all code in the header
    code-copy: true       # copy button on code blocks
    df-print: paged       # nice paginated tables for DataFrames
    # Section numbering: Quarto numbers chapters/sections automatically and
    # continuously across the whole book (Notebook 1 = ch. 1, Notebook 2a =
    # ch. 2, ...). Hard-coded numbers were stripped from the headings so this
    # is the single source of truth. Flexibility knobs:
    #   number-sections: false  -> turn numbering off entirely
    #   number-depth: 2         -> only number to e.g. 1.2 (not 1.2.8)
    number-sections: true
    number-depth: 3
    execute:
      echo: true
      eval: false         # use the outputs already embedded in the .ipynb
