# Pre-commit hooks for the course repo.
#
# Commit-stage (sync) — enable once:   pre-commit install
# Run manually:                        pre-commit run --all-files --hook-stage <stage>
repos:
  - repo: https://github.com/mwouts/jupytext
    rev: v1.19.4
    hooks:
      # Keeps each .ipynb and its paired .py (py:percent) in sync on commit.
      # If the hook rewrites a file, the commit aborts — re-stage and commit again.
      - id: jupytext
        args: [--sync]

# Note: embedding notebook outputs is a manual step — run
# scripts/execute_notebooks.sh before pushing when plots are stale. It is
# intentionally NOT a pre-push hook: re-executing notebooks is non-deterministic
# (random cell IDs on jupytext round-trips, random demo output), so it would
# change files on every run and permanently block pushes.
